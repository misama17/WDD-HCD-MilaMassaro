<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="MilaMassaro">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/svg+xml" href="">

    <link href="./styles/style.css" rel="stylesheet">
    <script defer src="./scripts/script.js"></script>

    <title>Human Centred Design</title>
</head>

<body>

    <main>
        <section class="main-container">

            <section class="post-container">
                <div class="header">
                    <img class="pp" src="https://picsum.photos/100/100" alt="profielfoto">
                    <h2 class="name">Mila</h2>
                </div>
                
                <img class="post" src="https://images.seattletimes.com/wp-content/uploads/2023/10/10142023_impressions_195106.jpg?d=780x572" alt="">
                
                <div class="likes">
                    <svg class="heart" aria-label="Like" height="24" role="img" viewBox="0 0 24 24" width="24">
                        <title>Like</title>
                        <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938m0-2a6.04 6.04 0 0 0-4.797 2.127 6.052 6.052 0 0 0-4.787-2.127A6.985 6.985 0 0 0 .5 9.122c0 3.61 2.55 5.827 5.015 7.97.283.246.569.494.853.747l1.027.918a44.998 44.998 0 0 0 3.518 3.018 2 2 0 0 0 2.174 0 45.263 45.263 0 0 0 3.626-3.115l.922-.824c.293-.26.59-.519.885-.774 2.334-2.025 4.98-4.32 4.98-7.94a6.985 6.985 0 0 0-6.708-7.218Z"></path>
                    </svg>
                    <svg class="comment" aria-label="Comment" height="24" role="img" viewBox="0 0 24 24" width="24">
                        <title>Comment</title>
                        <path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L22 22Z" fill="none" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </div>

                <p class="likes-count">2101 likes</p>

                <p class="caption">Mooie caption is leuk!</p>

                <div class="add-comment">
                    <label for="user-comment" class="user-comment">
                        <input type="text" id="user-comment" placeholder="Add comment...">
                    </label>

                    <svg aria-label="Share Post" class="x1lliihq x1n2onr6 x1roi4f4" fill="currentColor" height="24" role="img" viewBox="0 0 24 24" width="24">
                        <title>Share Post</title>
                        <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="22" x2="9.218" y1="3" y2="10.083"></line>
                        <polygon fill="none" points="11.698 20.334 22 3.001 2 3.001 9.218 10.084 11.698 20.334" stroke="currentColor" stroke-linejoin="round" stroke-width="2"></polygon>
                    </svg>
                </div>
                
            </section>

        </section>
    </main>

</body>
